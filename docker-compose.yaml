
networks:
  web:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:

services:

  # -----------------------------------------------------------
  # TRAEFIK — Reverse Proxy
  # Dashboard: http://localhost:8080
  # -----------------------------------------------------------
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=web"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - web

  # -----------------------------------------------------------
  # DATABASE — PostgreSQL 15
  # Preserves original backend/docker-compose.yaml config exactly
  # -----------------------------------------------------------
  db:
    image: postgres:15
    container_name: tomato_db
    restart: always
    environment:
      POSTGRES_DB: tomato_db
      POSTGRES_USER: tomato_user
      POSTGRES_PASSWORD: tomato_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tomato_user -d tomato_db"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - web

  redis:
    image: redis:7-alpine
    container_name: tomato_redis
    restart: unless-stopped
    networks:
      - web

  rabbitmq:
    image: rabbitmq:4.3-management
    container_name: tomato_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: tomato_mqtt
      RABBITMQ_DEFAULT_PASS: tomato_mqtt_pass
      RABBITMQ_DEFAULT_VHOST: /
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_mqtt &&
             rabbitmq-server"
    ports:
      - "5672:5672"
      - "1883:1883"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - web

  # -----------------------------------------------------------
  # BACKEND — Django (port 8000)
  # Traefik routes: /api, /admin, and /static
  # Higher priority (10) so it wins before the frontend catch-all
  # -----------------------------------------------------------
  # -----------------------------------------------------------
  # AI WORKER - RabbitMQ AMQP Consumer for FAISS Inference
  # Consumes MQTT-routed edge payloads from RabbitMQ through AMQP
  # -----------------------------------------------------------
  ai_worker:
    build:
      context: ./ai_assets
      dockerfile: Dockerfile.worker
    container_name: tomato_ai_worker
    restart: unless-stopped
    environment:
      AI_WORKER_RABBITMQ_HOST: rabbitmq
      AI_WORKER_RABBITMQ_PORT: "5672"
      AI_WORKER_RABBITMQ_USERNAME: tomato_mqtt
      AI_WORKER_RABBITMQ_PASSWORD: tomato_mqtt_pass
      AI_WORKER_RABBITMQ_VHOST: /
      AI_WORKER_REQUEST_EXCHANGE: amq.topic
      AI_WORKER_REQUEST_QUEUE: tomato.ai.inference.requests.v1
      AI_WORKER_REQUEST_BINDING_KEY: tomato.edge.v1.*.feature-vector
      AI_WORKER_DEAD_LETTER_EXCHANGE: tomato.ai.inference.deadletter
      AI_WORKER_DEAD_LETTER_QUEUE: tomato.ai.inference.deadletter.v1
      AI_WORKER_DEAD_LETTER_ROUTING_KEY: tomato.ai.inference.deadletter.v1
      AI_WORKER_PREFETCH_COUNT: "1"
      AI_WORKER_LOG_LEVEL: INFO
      AI_WORKER_RESULT_SINK: backend_http
      AI_WORKER_BACKEND_INGESTION_URL: http://backend:8000/api/v1/inspections/ingest-ai-result/
      AI_WORKER_BACKEND_INGESTION_TOKEN: tomato-ai-worker-dev-token
      AI_WORKER_BACKEND_TIMEOUT_SECONDS: "10"
      AI_WORKER_BACKEND_MAX_ATTEMPTS: "3"
      AI_WORKER_BACKEND_RETRY_DELAY_SECONDS: "2"
      AI_WORKER_ASSETS_DIR: /app/ai_assets
      AI_WORKER_TOP_K_DISEASE: "5"
      AI_WORKER_MIN_ORGAN_CLASSIFIER_PROBA: "0.70"
    depends_on:
      backend:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    command: ["python", "-m", "ai_worker.consumer"]
    networks:
      - web

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tomato_backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: django-insecure-change-me-please-replace-this-secret
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend,traefik"
      AI_ASSETS_DIR: /app/ai_assets
      POSTGRES_DB: tomato_db
      POSTGRES_USER: tomato_user
      POSTGRES_PASSWORD: tomato_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      AI_WORKER_INGESTION_TOKEN: tomato-ai-worker-dev-token
    volumes:
      - ./ai_assets:/app/ai_assets
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    networks:
      - web
    labels:
      - "traefik.enable=true"

      # ---------- /api/** → backend ----------
      - "traefik.http.routers.backend-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend-api.entrypoints=web"
      - "traefik.http.routers.backend-api.priority=10"
      - "traefik.http.routers.backend-api.service=backend-svc"

      # ---------- /admin/** → backend ----------
      - "traefik.http.routers.backend-admin.rule=PathPrefix(`/admin`)"
      - "traefik.http.routers.backend-admin.entrypoints=web"
      - "traefik.http.routers.backend-admin.priority=10"
      - "traefik.http.routers.backend-admin.service=backend-svc"

      - "traefik.http.routers.backend-ws-notifications.rule=PathPrefix(`/ws/notifications`)"
      - "traefik.http.routers.backend-ws-notifications.entrypoints=web"
      - "traefik.http.routers.backend-ws-notifications.priority=11"
      - "traefik.http.routers.backend-ws-notifications.service=backend-svc"

      - "traefik.http.routers.backend-static.rule=PathPrefix(`/static`)"
      - "traefik.http.routers.backend-static.entrypoints=web"
      - "traefik.http.routers.backend-static.priority=10"
      - "traefik.http.routers.backend-static.service=backend-svc"

      # ---------- backend service definition ----------
      - "traefik.http.services.backend-svc.loadbalancer.server.port=8000"

  # -----------------------------------------------------------
  # FRONTEND — Vite React (port 3000)
  # Traefik route: catch-all /  (priority=1, lowest)
  # Volumes provide hot reload without rebuilding
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tomato_frontend
    restart: unless-stopped
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
      VITE_USE_POLLING: "false"
      VITE_WATCH_INTERVAL: "1000"
    command: >
      sh -c "npm run build &&
             npm run preview -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    networks:
      - web
    labels:
      - "traefik.enable=true"

      # ---------- /** → frontend (catch-all, lowest priority) ----------
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.routers.frontend.service=frontend-svc"

      # ---------- frontend service definition ----------
      - "traefik.http.services.frontend-svc.loadbalancer.server.port=3000"
